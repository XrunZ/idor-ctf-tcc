<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Halaman Tidak Ditemukan — SawitNet</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root {
      --bg: #08120a;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.2);
      --text: #f8fafc;
      --muted: #64748b;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
      text-align: center;
      background: radial-gradient(circle at center, #0c3b20 0%, #05140a 70%, #020603 100%);
      padding: 20px;
    }
    .container {
      max-width: 480px;
      padding: 40px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
    }
    h1 {
      font-size: 5.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -3px;
      text-shadow: 0 0 20px var(--accent-glow);
    }
    h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }
    p {
      color: var(--muted);
      margin-bottom: 32px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      color: #052e16;
      background-color: var(--accent);
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    a:hover {
      background-color: #4ade80;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Halaman Tidak Ditemukan</h2>
    <p>Maaf, halaman yang Anda cari tidak tersedia atau telah dipindahkan ke alamat lain.</p>
    <a href="/">Kembali ke Beranda</a>
  </div>
</body>
</html>
