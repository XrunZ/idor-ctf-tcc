<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SawitNet</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root {
      --bg: #08120a;
      --card: rgba(15, 23, 42, 0.6);
      --border: rgba(255, 255, 255, 0.06);
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.3);
      --text: #f8fafc;
      --muted: #64748b;
      --err: #ef4444;
    }
    html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;color:var(--text)}
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #0c2e1a 0%, #061309 60%, #030704 100%);
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 {
      font-size: 1.85rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .login-logo h1 span {
      color: var(--accent);
    }
    .login-logo p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 500;
    }
    .ig {
      margin-bottom: 16px;
      position: relative;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.92rem;
      font-weight: 500;
      outline: none;
      transition: all 0.2s ease;
    }
    input::placeholder {
      color: #475569;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    {% if error %}
    input {
      border-color: rgba(239, 68, 68, 0.3);
    }
    input:focus {
      border-color: var(--err);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }
    {% endif %}
    .shake {
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #052e16;
      font-weight: 700;
      font-size: 0.92rem;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button:hover {
      background: #4ade80;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    button:active {
      transform: translateY(0);
    }
    .dot {
      display: {% if error %}block{% else %}none{% endif %};
      width: 6px;
      height: 6px;
      background: var(--err);
      border-radius: 50%;
      margin: 0 auto 16px;
      box-shadow: 0 0 8px var(--err);
    }
    footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: #475569;
      font-family: 'Courier New', monospace;
      font-weight: 600;
    }
    footer span {
      color: #1e293b;
    }
  </style>
</head>
<body>
  <div class="card {% if error %}shake{% endif %}">
    <div class="login-logo">
      <h1>🌴 Sawit<span>Net</span></h1>
      <p>Sistem Pemesanan Kelapa Sawit</p>
    </div>
    <div class="dot"></div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="ig">
        <input type="text" name="username" placeholder="Username" autocomplete="off" autofocus required/>
      </div>
      <div class="ig">
        <input type="password" name="password" placeholder="Password" required/>
      </div>
      <button type="submit">Masuk Ke Sistem &rarr;</button>
    </form>
  </div>
  <footer>Made by WSE DIVISION <span>&lt;</span>/XrunZ<span>&gt;</span></footer>
</body>
</html>
